		<script>

document.querySelector('a[data-disabled="true"]').addEventListener('click', function(e) {
    if (this.dataset.disabled === 'true') {
        e.preventDefault();
        
        Swal.fire({
            icon: 'info',
            title: 'ثبت نام غیرفعال',
            text: 'در حال حاضر امکان ثبت نام نمی‌باشد. لطفاً بعداً تلاش کنید.',
            confirmButtonText: 'متوجه شدم',
            cancelButtonText: 'انصراف',
            confirmButtonColor: '#6c757d',
            showCancelButton: false,
            allowOutsideClick: true,


        });
    }
});
